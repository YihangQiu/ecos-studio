name: Setup Rust Cache
description: Setup stable Rust, cache Cargo artifacts, and enable sccache for Rust compilations.

inputs:
  workspaces:
    description: Rust workspace paths for Swatinem/rust-cache.
    required: false
    default: ecos/gui/src-tauri
  cache-targets:
    description: Whether to cache target directories.
    required: false
    default: "true"
  enable-sccache:
    description: Whether to enable sccache backed by the GitHub Actions cache.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup sccache
      if: ${{ inputs.enable-sccache == 'true' }}
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Enable sccache for Rust
      if: ${{ inputs.enable-sccache == 'true' }}
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.workspaces }}
        cache-targets: ${{ inputs.cache-targets }}
