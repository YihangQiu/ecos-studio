name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release (for example, v0.1.0-alpha.3)
        required: true

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Check version
        id: version
        uses: ./.github/actions/check-version
        with:
          expected_tag: ${{ github.event.inputs.tag_name || github.ref_name }}

  build:
    name: Build AppImage
    needs: check-version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --fix-missing \
            git curl ca-certificates build-essential pkg-config \
            python3 python3-venv python3-pip python3-dev \
            libgtk-3-dev libgtk-3-bin libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libcairo2-dev libpango1.0-dev libgdk-pixbuf-2.0-dev \
            libglib2.0-dev libglib2.0-bin librsvg2-dev \
            cmake ninja-build tcl-dev \
            libgflags-dev libgoogle-glog-dev libboost-all-dev libgtest-dev \
            flex libeigen3-dev libunwind-dev libmetis-dev libgmp-dev bison \
            libhwloc-dev libcurl4-openssl-dev libtbb-dev \
            patchelf jq wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ecos/gui/.nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Rust
        uses: ./.github/actions/setup-rust-cache

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Setup Bazel
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/bazelbuild/bazel/releases/download/8.5.0/bazel-8.5.0-linux-x86_64 \
            -o "$HOME/.local/bin/bazel"
          chmod +x "$HOME/.local/bin/bazel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync server environment
        working-directory: ecos/server
        run: uv sync --frozen --all-groups --all-extras --python 3.11

      - name: Build release bundle
        env:
          ENABLE_OSS_CAD_SUITE: "true"
          TAURI_BUNDLES: appimage
        run: |
          PATH="$PWD/ecos/server/.venv/bin:$PATH" bazel build //:ecos_studio_bundle

      - name: Extract AppImage
        run: |
          BUNDLE_TAR="bazel-bin/ecos/ecos_studio_bundle/ecos_studio_bundle.tar"

          rm -rf dist/release
          mkdir -p dist/release

          tar -tf "$BUNDLE_TAR" | grep -E '(^|/)[^/]+\.AppImage$' > /tmp/ecos-release-files.txt || true
          if [ ! -s /tmp/ecos-release-files.txt ]; then
            echo "ERROR: AppImage artifact not found in $BUNDLE_TAR" >&2
            echo "Bundle contents:" >&2
            tar -tf "$BUNDLE_TAR" | sed -n '1,200p' >&2
            exit 1
          fi

          tar -xf "$BUNDLE_TAR" -C dist/release -T /tmp/ecos-release-files.txt

          echo "Built AppImage artifact:"
          find dist/release -type f -name '*.AppImage' | sort

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecos-studio-release
          if-no-files-found: error
          path: |
            dist/release/**/*.AppImage

  release:
    name: Create Release
    needs: [check-version, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ecos-studio-release
          path: dist/release

      - name: Determine tag version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_TAG="${{ github.event.inputs.tag_name }}"
          else
            FULL_TAG="${GITHUB_REF_NAME}"
          fi
          TAG_VERSION="${FULL_TAG#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --output release-changelog.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate release notes
        run: |
          {
            echo "> [!WARNING]"
            echo "> **ECOS Studio** is still under rapid development. You can download the latest version from the [release page](https://github.com/openecos-projects/ecos-studio/releases) to try it out (The current release builds are produced on **Ubuntu 22.04**, so using an older Linux system may lead to compatibility issues. Additionally, ECOS Studio currently only supports the **x86_64** Linux platform.)."
            echo ">"
            echo ""
            cat release-changelog.md
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t ASSETS < <(find dist/release -type f -name '*.AppImage' | sort)
          gh release create "${{ steps.version.outputs.full_tag }}" \
            --title "ECOS Studio ${{ steps.version.outputs.full_tag }}" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"
