[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "ecos-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "chipcompiler",
    "fastapi>=0.109",
    "uvicorn>=0.27",
]

[tool.uv.sources]
chipcompiler = { workspace = true }

[tool.uv.workspace]
members = ["ecc"]
